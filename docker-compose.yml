services:
  app:
    image: "${COMMU_BIN_IMAGE:?set COMMU_BIN_IMAGE to your Docker Hub image}"
    container_name: commu-bin
    restart: unless-stopped
    ports:
      - "18577:18577"
    environment:
      DELIVERY_HTTP_AUTH_SECRET: "${DELIVERY_HTTP_AUTH_SECRET:?set DELIVERY_HTTP_AUTH_SECRET}"
      DELIVERY_HTTP_PORT: "18577"
      DATABASE_PATH: "/app/data/data.db"
      LOGGING_FILEPATH: "/app/logs/app.jsonl"
      STORAGE_PROVIDER: "local"
      STORAGE_LOCAL_ROOTDIR: "/app/data/uploads"
      JOBS_ENABLED: "true"
      ADMIN_BOOTSTRAP_ENABLED: "false"
    volumes:
      - commu_data:/app/data
      - commu_logs:/app/logs

volumes:
  commu_data:
  commu_logs:
