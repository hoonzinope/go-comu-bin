  /auth/login:
    post:
      consumes:
      - application/json
      description: Authenticate user and return bearer token in Authorization response
        header.
      parameters:
      - description: Login payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/delivery.userCredentialRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          headers:
            Authorization:
              description: Bearer <token>
              type: string
          schema:
            $ref: '#/definitions/delivery.loginResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/delivery.errorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/delivery.errorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/delivery.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/delivery.errorResponse'
      summary: Login
      tags:
      - Auth
  /auth/logout:
    post:
