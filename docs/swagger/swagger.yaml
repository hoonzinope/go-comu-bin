basePath: /api/v1
definitions:
  delivery.boardRequest:
    properties:
      description:
        example: free board
        type: string
      name:
        example: free
        type: string
    type: object
  delivery.commentRequest:
    properties:
      content:
        example: nice post
        type: string
    type: object
  delivery.errorResponse:
    properties:
      error:
        example: invalid credential
        type: string
    type: object
  delivery.idResponse:
    properties:
      id:
        example: 1
        type: integer
    type: object
  delivery.loginResponse:
    properties:
      login:
        example: ok
        type: string
    type: object
  delivery.logoutResponse:
    properties:
      logout:
        example: ok
        type: string
    type: object
  delivery.passwordOnlyRequest:
    properties:
      password:
        example: pw
        type: string
    type: object
  delivery.postRequest:
    properties:
      content:
        example: first post
        type: string
      title:
        example: hello
        type: string
    type: object
  delivery.reactionRequest:
    properties:
      reaction_type:
        example: like
        type: string
    type: object
  delivery.signUpResponse:
    properties:
      result:
        example: ok
        type: string
    type: object
  delivery.userCredentialRequest:
    properties:
      password:
        example: pw
        type: string
      username:
        example: alice
        type: string
    type: object
  response.Board:
    properties:
      created_at:
        type: string
      description:
        type: string
      id:
        type: integer
      name:
        type: string
    type: object
  response.BoardList:
    properties:
      boards:
        items:
          $ref: '#/definitions/response.Board'
        type: array
      has_more:
        type: boolean
      last_id:
        type: integer
      limit:
        type: integer
      next_last_id:
        type: integer
    type: object
  response.Comment:
    properties:
      author_id:
        type: integer
      content:
        type: string
      created_at:
        type: string
      id:
        type: integer
      parent_id:
        type: integer
      post_id:
        type: integer
    type: object
  response.CommentDetail:
    properties:
      comment:
        $ref: '#/definitions/response.Comment'
      reactions:
        items:
          $ref: '#/definitions/response.Reaction'
        type: array
    type: object
  response.CommentList:
    properties:
      comments:
        items:
          $ref: '#/definitions/response.Comment'
        type: array
      has_more:
        type: boolean
      last_id:
        type: integer
      limit:
        type: integer
      next_last_id:
        type: integer
    type: object
  response.Post:
    properties:
      author_id:
        type: integer
      board_id:
        type: integer
      content:
        type: string
      created_at:
        type: string
      id:
        type: integer
      title:
        type: string
      updated_at:
        type: string
    type: object
  response.PostDetail:
    properties:
      comments:
        items:
          $ref: '#/definitions/response.CommentDetail'
        type: array
      post:
        $ref: '#/definitions/response.Post'
      reactions:
        items:
          $ref: '#/definitions/response.Reaction'
        type: array
    type: object
  response.PostList:
    properties:
      has_more:
        type: boolean
      last_id:
        type: integer
      limit:
        type: integer
      next_last_id:
        type: integer
      posts:
        items:
          $ref: '#/definitions/response.Post'
        type: array
    type: object
  response.Reaction:
    properties:
      created_at:
        type: string
      id:
        type: integer
      target_id:
        type: integer
      target_type:
        type: string
      type:
        type: string
      user_id:
        type: integer
    type: object
info:
  contact: {}
