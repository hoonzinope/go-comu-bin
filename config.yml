cache:
  listTTLSeconds: 30
  detailTTLSeconds: 30

storage:
  provider: "local"
  local:
    rootDir: "./data/uploads"
  object:
    endpoint: ""
    bucket: ""
    accessKey: ""
    secretKey: ""
    useSSL: false
  attachment:
    maxUploadSizeBytes: 10485760
    imageOptimization:
      enabled: true
      jpegQuality: 82

delivery:
  http:
    port: 18577
    maxJSONBodyBytes: 1048576
    defaultPageLimit: 10
    auth:
      secret: ""

event:
  outbox:
    workerCount: 1
    batchSize: 100
    pollIntervalMillis: 100
    maxAttempts: 5
    baseBackoffMillis: 200

admin:
  bootstrap:
    enabled: false
    username: ""
    password: ""

jobs:
  enabled: true
  attachmentCleanup:
    enabled: true
    intervalSeconds: 600
    gracePeriodSeconds: 600
    batchSize: 50
