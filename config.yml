cache:
  listTTLSeconds: 30
  detailTTLSeconds: 30

storage:
  provider: "local"
  local:
    rootDir: "./data/uploads"
  object:
    endpoint: ""
    bucket: ""
    accessKey: ""
    secretKey: ""
    useSSL: false
  attachment:
    maxUploadSizeBytes: 10485760
    imageOptimization:
      enabled: true
      jpegQuality: 82

delivery:
  http:
    port: 18577
    maxJSONBodyBytes: 1048576
    defaultPageLimit: 10
    rateLimit:
      enabled: true
      windowSeconds: 60
      readRequests: 300
      writeRequests: 60
    auth:
      secret: ""
  mail:
    enabled: false
    smtp:
      host: ""
      port: 587
      username: ""
      password: ""
      from: ""
      startTLS: true
      implicitTLS: false

event:
  outbox:
    workerCount: 1
    batchSize: 100
    pollIntervalMillis: 100
    maxAttempts: 5
    baseBackoffMillis: 200
    processingLeaseMillis: 30000
    leaseRefreshMillis: 10000

admin:
  bootstrap:
    enabled: false
    username: ""
    password: ""

jobs:
  enabled: true
  attachmentCleanup:
    enabled: true
    intervalSeconds: 600
    gracePeriodSeconds: 600
    batchSize: 50
