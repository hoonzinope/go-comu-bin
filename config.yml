cache:
  listTTLSeconds: 30
  detailTTLSeconds: 30

storage:
  provider: "local"
  local:
    rootDir: "./data/uploads"
  object:
    endpoint: ""
    bucket: ""
    accessKey: ""
    secretKey: ""
    useSSL: false
  attachment:
    maxUploadSizeBytes: 10485760
    imageOptimization:
      enabled: true
      jpegQuality: 82

delivery:
  http:
    port: 18577
    auth:
      secret: "commu-bin-secret-key"

jobs:
  enabled: true
  orphanAttachmentCleanup:
    enabled: true
    intervalSeconds: 600
    gracePeriodSeconds: 86400
    batchSize: 50
