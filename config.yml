cache:
  listTTLSeconds: 30
  detailTTLSeconds: 30
  maxCost: 100000
  numCounters: 1000000
  bufferItems: 64
  metrics: false

logging:
  filePath: "./logs/app.jsonl"
  maxSizeMB: 100
  maxBackups: 10
  maxAgeDays: 30
  compress: true
  localTime: true

storage:
  provider: "local"
  local:
    rootDir: "./data/uploads"
  object:
    endpoint: ""
    bucket: ""
    accessKey: ""
    secretKey: ""
    useSSL: false
  attachment:
    maxUploadSizeBytes: 10485760
    imageOptimization:
      enabled: true
      jpegQuality: 82

delivery:
  http:
    port: 18577
    maxJSONBodyBytes: 1048576
    defaultPageLimit: 10
    trustedProxies: []
    rateLimit:
      enabled: true
      windowSeconds: 60
      readRequests: 300
      writeRequests: 60
    auth:
      secret: ""
      passwordResetRequestRateLimit:
        enabled: true
        windowSeconds: 60
        maxRequests: 5
  mail:
    enabled: false
    passwordReset:
      baseURL: "https://app.example.com/reset-password"
    smtp:
      host: ""
      port: 587
      username: ""
      password: ""
      from: ""
      startTLS: true
      implicitTLS: false

event:
  outbox:
    workerCount: 1
    batchSize: 100
    pollIntervalMillis: 100
    maxAttempts: 5
    baseBackoffMillis: 200
    processingLeaseMillis: 30000
    leaseRefreshMillis: 10000

admin:
  bootstrap:
    enabled: false
    username: ""
    password: ""

jobs:
  enabled: true
  attachmentCleanup:
    enabled: true
    intervalSeconds: 600
    gracePeriodSeconds: 600
    batchSize: 50
  guestCleanup:
    enabled: true
    intervalSeconds: 600
    pendingGracePeriodSeconds: 600
    activeUnusedGracePeriodSeconds: 86400
    batchSize: 50
  passwordResetCleanup:
    enabled: true
    intervalSeconds: 600
    gracePeriodSeconds: 600
    batchSize: 100
